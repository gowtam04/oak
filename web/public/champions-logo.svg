<?xml version="1.0" encoding="UTF-8"?>
<!--
  PLACEHOLDER for the official "Pokémon Champions" logo.
  Swap this out with the real artwork the product owner provided:
    - drop the official file in as web/public/champions-logo.png (or .svg), and
    - point ChampionsToggle's <img src> at it.
  The toggle drains this to greyscale when Champions mode is off and shows it in
  full colour when on, so any wide wordmark-style logo works here.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" role="img" aria-label="Pokémon Champions">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe07a"/>
      <stop offset="0.5" stop-color="#f8c72e"/>
      <stop offset="1" stop-color="#e39c15"/>
    </linearGradient>
  </defs>
  <ellipse cx="120" cy="48" rx="116" ry="28" fill="url(#gold)" stroke="#a9700a" stroke-width="3"/>
  <text x="18" y="30" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700"
        fill="#2f5fd0" stroke="#ffffff" stroke-width="0.6">Pokémon</text>
  <g>
    <rect x="98" y="36" width="26" height="26" rx="5" fill="#e23b2e" stroke="#7a1a12" stroke-width="2"/>
    <text x="104" y="56" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#fff">P</text>
  </g>
  <text x="20" y="58" font-family="Arial Black, Arial, sans-serif" font-size="21" font-weight="900"
        fill="#171717" letter-spacing="1">CHAM</text>
  <text x="128" y="58" font-family="Arial Black, Arial, sans-serif" font-size="21" font-weight="900"
        fill="#171717" letter-spacing="1">IONS</text>
</svg>
